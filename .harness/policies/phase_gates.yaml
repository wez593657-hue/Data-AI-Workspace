version: "0.2"
workflows:
  data_warehouse:
    CREATED:
      next: WORKSPACE_CHECKED
      required_evidence: [workspace_status]
    WORKSPACE_CHECKED:
      next: REQUIREMENT_PARSED
      required_evidence: [requirement_read]
    REQUIREMENT_PARSED:
      next: MEMORY_CARD_VERIFIED
      required_evidence: [memory_card_check]
    MEMORY_CARD_VERIFIED:
      next: BUSINESS_RULES_CONFIRMED
      required_evidence: [business_rules_confirmation]
    BUSINESS_RULES_CONFIRMED:
      next: DATA_LINEAGE_CONFIRMED
      required_evidence: [lineage_analysis]
    DATA_LINEAGE_CONFIRMED:
      next: DDL_READY
      required_evidence: [ddl_check]
    DDL_READY:
      next: DICTIONARY_READY
      required_evidence: [dictionary_check]
    DICTIONARY_READY:
      next: MAPPING_READY
      required_evidence: [mapping_check]
    MAPPING_READY:
      next: SQL_READY
      required_evidence: [sql_check]
    SQL_READY:
      next: PROCEDURE_READY
      required_evidence: [procedure_check]
    PROCEDURE_READY:
      next: ETL_READY
      required_evidence: [etl_check]
    ETL_READY:
      next: REVERSE_LOGIC_PASSED
      required_evidence: [reverse_logic_check]
    REVERSE_LOGIC_PASSED:
      next: TEST_PASSED
      required_evidence: [test_report]
    TEST_PASSED:
      next: USER_APPROVED
      required_evidence: [test_report]
    USER_APPROVED:
      next: FULL_VALIDATION_PASSED
      required_evidence: [user_approval]
    FULL_VALIDATION_PASSED:
      next: COMMIT_ALLOWED
      required_evidence: [full_validation]
    COMMIT_ALLOWED:
      next: PUSH_ALLOWED
      required_evidence: [commit_authorization]
    PUSH_ALLOWED:
      next: COMPLETED
      required_evidence: [push_authorization]
  harness:
    CREATED:
      next: WORKSPACE_CHECKED
      required_evidence: [workspace_status]
    WORKSPACE_CHECKED:
      next: IMPLEMENTATION_READY
      required_evidence: [implementation_scope]
    IMPLEMENTATION_READY:
      next: QUICK_VALIDATION_PASSED
      required_evidence: [quick_validation]
    QUICK_VALIDATION_PASSED:
      next: FULL_VALIDATION_PASSED
      required_evidence: [full_validation]
    FULL_VALIDATION_PASSED:
      next: USER_APPROVED
      required_evidence: [user_approval]
    USER_APPROVED:
      allowed_next: [NEXT_PHASE_ALLOWED, RELEASE_APPROVED]
      required_evidence_by_target:
        NEXT_PHASE_ALLOWED: [next_phase_authorization]
        RELEASE_APPROVED: [release_approval]
    NEXT_PHASE_ALLOWED:
      next: IMPLEMENTATION_READY
      required_evidence: [next_phase_scope]
    IMPLEMENTATION_READY:
      next: QUICK_VALIDATION_PASSED
      required_evidence: [quick_validation]
    QUICK_VALIDATION_PASSED:
      next: FULL_VALIDATION_PASSED
      required_evidence: [full_validation]
    RELEASE_APPROVED:
      next: COMMIT_ALLOWED
      required_evidence: [commit_authorization]
    COMMIT_ALLOWED:
      next: COMPLETED
      required_evidence: [completion_record]
  requirement_development:
    CREATED:
      next: REQUIREMENT_ANALYZED
      required_evidence: [workflow_routing]
    REQUIREMENT_ANALYZED:
      next: SCOPE_CONFIRMED
      required_evidence: [requirement_analysis]
    SCOPE_CONFIRMED:
      next: PROJECT_SCANNED
      required_evidence: [scope_confirmation]
    PROJECT_SCANNED:
      next: TABLE_LINEAGE_IDENTIFIED
      required_evidence: [project_scan]
    TABLE_LINEAGE_IDENTIFIED:
      next: SOURCE_CAPABILITY_ANALYZED
      required_evidence: [table_lineage]
    SOURCE_CAPABILITY_ANALYZED:
      next: FIELD_GAP_CONFIRMED
      required_evidence: [source_capability]
    FIELD_GAP_CONFIRMED:
      allowed_next: [REQUIREMENT_REVIEW_PASSED, MATERIALS_SUPPLEMENTED]
      required_evidence_by_target:
        REQUIREMENT_REVIEW_PASSED: [field_gap_confirmation]
        MATERIALS_SUPPLEMENTED: [field_gap_confirmation]
    MATERIALS_SUPPLEMENTED:
      next: SOURCE_CAPABILITY_ANALYZED
      required_evidence: [materials_supplement]
    REQUIREMENT_REVIEW_PASSED:
      allowed_next: [MEMORY_CARD_UPDATED, MATERIALS_SUPPLEMENTED]
      required_evidence_by_target:
        MEMORY_CARD_UPDATED: [requirement_review]
        MATERIALS_SUPPLEMENTED: [requirement_review]
    MEMORY_CARD_UPDATED:
      next: PROCEDURE_IMPLEMENTED
      required_evidence: [memory_card_update]
    PROCEDURE_IMPLEMENTED:
      next: PROCEDURE_REVIEW_PASSED
      required_evidence: [procedure_implementation]
    PROCEDURE_REVIEW_PASSED:
      allowed_next: [TMP_TABLES_GENERATED, PROCEDURE_IMPLEMENTED]
      required_evidence_by_target:
        TMP_TABLES_GENERATED: [procedure_review]
        PROCEDURE_IMPLEMENTED: [procedure_review]
    TMP_TABLES_GENERATED:
      next: FULL_VALIDATION_PASSED
      required_evidence: [temporary_table_generation]
    FULL_VALIDATION_PASSED:
      next: USER_APPROVED
      required_evidence: [full_validation]
    USER_APPROVED:
      next: COMMIT_ALLOWED
      required_evidence: [user_approval]
    COMMIT_ALLOWED:
      next: PUSH_ALLOWED
      required_evidence: [commit_authorization]
    PUSH_ALLOWED:
      next: COMPLETED
      required_evidence: [push_authorization]
  schema_change:
    CREATED:
      next: MAPPING_EXCEL_ANALYZED
      required_evidence: [workflow_routing]
    MAPPING_EXCEL_ANALYZED:
      next: RELATED_FILES_SCANNED
      required_evidence: [mapping_excel_analysis]
    RELATED_FILES_SCANNED:
      next: CHANGE_SCOPE_IDENTIFIED
      required_evidence: [related_files_scan]
    CHANGE_SCOPE_IDENTIFIED:
      next: USER_SCOPE_CONFIRMED
      required_evidence: [change_scope]
    USER_SCOPE_CONFIRMED:
      next: ASSETS_UPDATED
      required_evidence: [scope_confirmation]
    ASSETS_UPDATED:
      next: ASSETS_REVIEW_PASSED
      required_evidence: [asset_update]
    ASSETS_REVIEW_PASSED:
      allowed_next: [FULL_VALIDATION_PASSED, CHANGE_SCOPE_IDENTIFIED]
      required_evidence_by_target:
        FULL_VALIDATION_PASSED: [schema_consistency_review]
        CHANGE_SCOPE_IDENTIFIED: [schema_consistency_review]
    FULL_VALIDATION_PASSED:
      next: USER_APPROVED
      required_evidence: [full_validation]
    USER_APPROVED:
      next: COMMIT_ALLOWED
      required_evidence: [user_approval]
    COMMIT_ALLOWED:
      next: PUSH_ALLOWED
      required_evidence: [commit_authorization]
    PUSH_ALLOWED:
      next: COMPLETED
      required_evidence: [push_authorization]
