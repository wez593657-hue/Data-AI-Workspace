    purpose: 限制 AI 修复补丁允许路径
  - path: scripts/harness/
    purpose: 任务解析、变更范围和 CLI 门禁实现及测试
  - path: .harness/tasks/harness-governance-hardening-v1/
    purpose: 本次整改任务 Manifest 和证据
read_only_inputs:
  - data_assets/
  - requirements/
  - templates/
  - docs/
  - data_assets/stored_procedure/
