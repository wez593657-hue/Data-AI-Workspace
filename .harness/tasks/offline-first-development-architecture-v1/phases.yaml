  - id: documentation_and_migration
    sequence: 8
    status: completed
    objective: Simplify project guidance and migrate old workflow entry points incrementally.
    allowed_paths:
      - docs/
      - scripts/harness/
      - scripts/harness/tests/
      - .harness/
    acceptance_commands:
      - python -m unittest discover -s scripts/harness/tests -p 'test_*.py'
      - python -m scripts.harness validate offline-first-development-architecture-v1
      - python -m scripts.harness risk-check standard
    evidence:
      - E-0012
