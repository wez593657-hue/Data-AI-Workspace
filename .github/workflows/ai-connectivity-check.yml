name: AI Connectivity Check

on:
  workflow_dispatch:

  push:
    branches:
      - feature/ai-repair-loop

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
      AI_MODEL: ${{ secrets.AI_MODEL }}

    steps:
      - name: Validate configuration
        run: |
          test -n "$AI_API_KEY"
          test -n "$AI_BASE_URL"
          test -n "$AI_MODEL"

      - name: Call AI service
        run: |
          response_file="$RUNNER_TEMP/ai-response.json"
          status=$(curl --silent --show-error \
            --request POST "${AI_BASE_URL%/}/chat/completions" \
            --header "Authorization: Bearer $AI_API_KEY" \
            --header "Content-Type: application/json" \
            --output "$response_file" \
            --write-out "%{http_code}" \
            --data "{
              \"model\": \"$AI_MODEL\",
              \"messages\": [
                {
                  \"role\": \"user\",
                  \"content\": \"Return exactly: {\\"status\\":\\"ok\\"}\"
                }
              ]
            }")
          echo "HTTP status: $status"
          cat "$response_file"
          test "$status" -ge 200
          test "$status" -lt 300
          jq -e '.choices[0].message.content' "$response_file"
