name: AI Repair Loop

on:
  workflow_run:
    workflows: [Change Loop]
    types: [completed]

permissions:
  contents: read

jobs:
  repair:
    name: AI 修复尝试
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: 查找关联 PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            const pr = result.data.find(item => item.base.ref === 'master' || item.base.ref === 'develop');
            if (!pr) {
              core.setFailed(`未找到 ${sha} 对应的 master/develop PR`);
              return;
            }
            core.setOutput('number', String(pr.number));
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('base_ref', pr.base.ref);

      - name: 计算修复次数
        id: attempt
        if: steps.pr.outcome == 'success'
        shell: bash
        env:
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          if [[ "$HEAD_REF" =~ ^ai-fix/[0-9]+-([0-9]+)$ ]]; then
            attempt="${BASH_REMATCH[1]}"
            original_pr="${HEAD_REF#ai-fix/}"
            original_pr="${original_pr%-${attempt}}"
          else
            attempt=0
            original_pr="$PR_NUMBER"
          fi
          echo "attempt=$attempt" >> "$GITHUB_OUTPUT"
          echo "original_pr=$original_pr" >> "$GITHUB_OUTPUT"
          if (( attempt >= 3 )); then
            echo "exhausted=true" >> "$GITHUB_OUTPUT"
          else
            echo "exhausted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 检出受信任修复脚本
        if: steps.pr.outcome == 'success' && steps.attempt.outputs.exhausted == 'false'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: trusted
          fetch-depth: 1

      - name: 检出待修复 PR 代码
        if: steps.pr.outcome == 'success' && steps.attempt.outputs.exhausted == 'false'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          path: worktree
          fetch-depth: 0

      - name: 下载校验报告
        if: steps.pr.outcome == 'success' && steps.attempt.outputs.exhausted == 'false'
        uses: actions/download-artifact@v4
        with:
          name: validation-report
          path: worktree/.repair-input
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成当前差异
        if: steps.pr.outcome == 'success' && steps.attempt.outputs.exhausted == 'false'
        working-directory: worktree
        env:
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: git diff "origin/$BASE_REF...$HEAD_SHA" > .repair-input/current.diff

      - name: 请求 AI 生成受限补丁
        id: ai
        if: steps.pr.outcome == 'success' && steps.attempt.outputs.exhausted == 'false'
        continue-on-error: true
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: |
          python trusted/scripts/ai_repair.py \
            --report worktree/.repair-input/validation-report.txt \
            --diff worktree/.repair-input/current.diff \
            --output worktree/.repair-input/repair.patch

      - name: 应用并检查补丁
        id: apply
        if: steps.pr.outcome == 'success' && steps.attempt.outputs.exhausted == 'false' && steps.ai.outcome == 'success'
        continue-on-error: true
        working-directory: worktree
        run: |
          git apply --check .repair-input/repair.patch
          git apply --index .repair-input/repair.patch
          test -n "$(git diff --cached --name-only)"

      - name: 创建 AI 修复分支并推送
        if: steps.pr.outcome == 'success' && steps.attempt.outputs.exhausted == 'false' && steps.ai.outcome == 'success' && steps.apply.outcome == 'success'
        working-directory: worktree
        env:
          ATTEMPT: ${{ steps.attempt.outputs.attempt }}
          ORIGINAL_PR: ${{ steps.attempt.outputs.original_pr }}
        run: |
          repair_branch="ai-fix/${ORIGINAL_PR}-$((ATTEMPT + 1))"
          git switch -c "$repair_branch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(ai): apply constrained repair for PR #${ORIGINAL_PR}"
          git push --set-upstream origin "$repair_branch"
          echo "repair_branch=$repair_branch" >> "$GITHUB_ENV"

      - name: 创建修复 PR
        if: steps.pr.outcome == 'success' && steps.attempt.outputs.exhausted == 'false' && steps.ai.outcome == 'success' && steps.apply.outcome == 'success'
        uses: actions/github-script@v7
        env:
          REPAIR_BRANCH: ${{ env.repair_branch }}
          ORIGINAL_PR: ${{ steps.attempt.outputs.original_pr }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
          ATTEMPT: ${{ steps.attempt.outputs.attempt }}
        with:
          script: |
            async function ensureLabel(name, color) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name, color });
              }
            }
            await ensureLabel('ai-repair', '1d76db');
            const head = `${context.repo.owner}:${process.env.REPAIR_BRANCH}`;
            const created = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `AI repair: PR #${process.env.ORIGINAL_PR}, attempt ${Number(process.env.ATTEMPT) + 1}`,
              head,
              base: process.env.BASE_REF,
              body: `自动修复分支，来源 PR #${process.env.ORIGINAL_PR}。\n\n` +
                `本次为第 ${Number(process.env.ATTEMPT) + 1} 次修复尝试。必须重新通过完整校验和人工审批。`,
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: created.data.number,
              labels: ['ai-repair'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ORIGINAL_PR),
              body: `已创建 AI 修复 PR #${created.data.number}，修复次数：${Number(process.env.ATTEMPT) + 1}/3。`,
            });

      - name: AI 修复失败时转人工审查
        if: steps.pr.outcome == 'success' && steps.attempt.outputs.exhausted == 'false' && (steps.ai.outcome == 'failure' || steps.apply.outcome == 'failure')
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          ATTEMPT: ${{ steps.attempt.outputs.attempt }}
        with:
          script: |
            async function ensureLabel(name, color) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name, color });
              }
            }
            await ensureLabel('ai-repair', '1d76db');
            await ensureLabel('needs-human-review', 'b60205');
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `人工审查：AI 修复失败（PR #${process.env.PR_NUMBER}）`,
              body: `AI 自动修复在第 ${Number(process.env.ATTEMPT) + 1} 次尝试失败。请人工检查校验报告、AI 输出和变更边界后决定修复方案。\n\n原 PR: #${process.env.PR_NUMBER}`,
              labels: ['needs-human-review', 'ai-repair'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: `AI 修复未能生成可应用补丁，已转人工审查：#${issue.data.number}`,
            });
            core.setFailed('AI repair failed; human review issue created');

      - name: 判断是否达到人工转交条件
        id: route
        if: steps.pr.outcome == 'success'
        shell: bash
        env:
          HEAD_REPO: ${{ github.event.workflow_run.head_repository.full_name }}
          CURRENT_REPO: ${{ github.repository }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          if [[ "$HEAD_REPO" != "$CURRENT_REPO" ]]; then
            echo "required=true" >> "$GITHUB_OUTPUT"
          elif [[ "$HEAD_REF" =~ ^ai-fix/[0-9]+-([0-9]+)$ ]] && (( BASH_REMATCH[1] >= 3 )); then
            echo "required=true" >> "$GITHUB_OUTPUT"
          else
            echo "required=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 创建人工审查任务并保持失败
        if: steps.route.outputs.required == 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        with:
          script: |
            async function ensureLabel(name, color) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name, color });
              }
            }
            await ensureLabel('ai-repair', '1d76db');
            await ensureLabel('needs-human-review', 'b60205');
            const match = process.env.HEAD_REF.match(/^ai-fix\/([0-9]+)-([0-9]+)$/);
            const original = match ? match[1] : process.env.PR_NUMBER;
            const attempt = match ? match[2] : '0';
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `人工审查：自动修复闭环终止（PR #${original}）`,
              body: `自动修复已达到 3 次上限或 PR 来自外部仓库。\n\n当前 PR: #${process.env.PR_NUMBER}\n修复次数标识: ${attempt}\n请人工修复或终止该变更。`,
              labels: ['needs-human-review', 'ai-repair'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: `已转人工审查：#${issue.data.number}。PR 保持不可合并状态。`,
            });
            core.setFailed('manual review required');
