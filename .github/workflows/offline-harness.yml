name: Offline Harness

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  offline-harness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: python -m pip install pandas openpyxl xlrd pyyaml

      - name: Run standard risk gate
        run: python -m scripts.harness risk-check standard

      - name: Run Harness task validation
        run: python -m scripts.harness validate offline-first-development-architecture-v1

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: offline-harness-reports
          path: .harness/tasks/offline-first-development-architecture-v1/reports/
