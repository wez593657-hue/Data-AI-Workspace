name: 自动校验

on:
  push:
    branches: [ master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: |
        pip install pandas openpyxl xlrd

    - name: 执行数据一致性校验
      run: python scripts/validate_cross_layer_consistency.py
