name: Change Loop

on:
  pull_request:
    branches: [master, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate:
    name: 完整校验
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 检出 PR 代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: python -m pip install pandas openpyxl xlrd

      - name: 执行完整校验并生成报告
        id: validation
        continue-on-error: true
        run: python scripts/run_full_validation.py --report "$RUNNER_TEMP/validation-report.txt"

      - name: 保存校验报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: ${{ runner.temp }}/validation-report.txt
          if-no-files-found: error

      - name: 汇总校验结果
        if: steps.validation.outcome == 'failure'
        run: exit 1
