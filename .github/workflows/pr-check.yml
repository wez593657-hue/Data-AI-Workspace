name: PR 治理检查

on:
  pull_request:
    branches: [master, develop]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  harness-gate:
    name: Harness 变更白名单门禁
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 执行变更白名单检查
        id: resolve-task
        env:
          HARNESS_PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          task_id=$(python scripts/harness/resolve_task.py --branch "$GITHUB_HEAD_REF" | sed -n 's/^task_id=//p')
          test -n "$task_id"
          echo "task_id=$task_id" >> "$GITHUB_OUTPUT"
          python scripts/harness/change_guard.py --task-id "$task_id" --scope pr --base-ref "${{ github.event.pull_request.base.ref }}"

  checklist:
    name: PR 模板与变更边界
    runs-on: ubuntu-latest
    steps:
      - name: 检查 PR 模板和标题
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const requiredSections = [
              '## 类型', '## 描述', '## 关联需求', '## 变更范围',
              '## 检查清单', '## 测试结果', '## 风险评估', '## 审批人',
            ];
            const missing = requiredSections.filter(section => !body.includes(section));
            if (missing.length) {
              core.setFailed(`PR 模板缺少必填部分：${missing.join('、')}`);
            }
            if (!/<!--\s*harness-task-id\s*:\s*[a-z0-9][a-z0-9._-]{2,63}\s*-->/i.test(body)) {
              core.setFailed('PR 正文必须包含有效的 harness-task-id 标识');
            }
            if (!/^(feat|fix|docs|refactor|style|perf|test|chore|build|ci|revert|sync)(\([^()\n]+\))?: .+/.test(pr.title)) {
              core.setFailed('PR 标题必须符合 <type>(scope): <subject> 格式');
            }
